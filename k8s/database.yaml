# ── Secret — DB password ──────────────────────────────────────────────────────
# Generate your own with:
#   echo -n 'yourpassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: db-password-secret
  namespace: nodejs-app
type: Opaque
data:
  DB_PASSWORD: c2VjcmV0    # base64 of: secret

---
# ── PersistentVolumeClaim — postgres data storage ─────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata-pvc
  namespace: nodejs-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ── StatefulSet — postgres pod ────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: nodejs-app
  labels:
    app: postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "taskdb"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-password-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          # resources:
          #   requests:
          #     memory: "128Mi"
          #     cpu: "100m"
          #   limits:
          #     memory: "512Mi"
          #     cpu: "500m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata-pvc

---
# ── Service — exposes postgres inside the cluster only ───────────────────────
# The app connects via: DB_HOST=postgres-service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: nodejs-app
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432